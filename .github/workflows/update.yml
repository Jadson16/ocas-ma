name: Atualizar painel OCAS-MA

on:
  schedule:
    - cron: '0 6 1 * *'   # 1º de cada mês às 06:00 UTC
  workflow_dispatch:        # permite disparar manualmente pela interface do GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install requests pandas plotly

      - name: Coletar PEVS (extrativismo vegetal)
        id: pevs
        continue-on-error: true
        run: python scripts/fetch_pevs.py

      - name: Coletar PAM (lavouras)
        id: pam
        continue-on-error: true
        run: |
          python scripts/fetch_pam_temp.py
          python scripts/fetch_pam_perm.py

      - name: Coletar PPM (produção animal e rebanhos)
        id: ppm
        continue-on-error: true
        run: |
          python scripts/fetch_ppm_prod.py
          python scripts/fetch_ppm_rebanhos.py
          python scripts/fetch_mel.py

      - name: Gerar mapa interativo
        run: python scripts/generate_map.py

      - name: Calcular indicadores quantitativos
        run: python scripts/compute_indicators.py

      - name: Gerar painel de indicadores
        run: python scripts/generate_stats.py

      - name: Commit e push dos artefatos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html indicadores.html
          git diff --cached --quiet || git commit -m "chore: atualiza dados e painéis [$(date +'%Y-%m-%d')]"
          git push

      - name: Sumário do pipeline
        if: always()
        run: |
          STATUS_PEVS="${{ steps.pevs.outcome }}"
          STATUS_PAM="${{ steps.pam.outcome }}"
          STATUS_PPM="${{ steps.ppm.outcome }}"

          icon() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }

          {
            echo "## OCAS-MA — Atualização $(date +'%d/%m/%Y')"
            echo ""
            echo "| Etapa | Status | Detalhes |"
            echo "| --- | --- | --- |"
            echo "| PEVS | $(icon $STATUS_PEVS) $STATUS_PEVS | $(find data/babacu data/acai data/buriti data/carnauba data/carnauba_fibra data/piacava -name '*.csv' 2>/dev/null | wc -l) CSVs |"
            echo "| PAM  | $(icon $STATUS_PAM) $STATUS_PAM  | $(find data/arroz data/milho data/soja data/mandioca data/feijao data/cana data/melancia data/amendoim data/algodao data/banana data/castanha_caju data/coco data/laranja data/acai_cult data/mamao data/manga data/maracuja data/borracha -name '*.csv' 2>/dev/null | wc -l) CSVs |"
            echo "| PPM  | $(icon $STATUS_PPM) $STATUS_PPM  | $(find data/mel data/leite data/ovos data/bovino data/bubalino data/equino data/suino data/caprino data/ovino data/galinaceo -name '*.csv' 2>/dev/null | wc -l) CSVs |"
            echo ""
            echo "**Dashboard:** \`index.html\` — $(du -sh index.html | cut -f1)"
            echo "**Indicadores:** \`indicadores.html\` — $(du -sh indicadores.html 2>/dev/null | cut -f1 || echo 'não gerado')"
            echo ""
            if [ "$STATUS_PEVS" != "success" ] || [ "$STATUS_PAM" != "success" ] || [ "$STATUS_PPM" != "success" ]; then
              echo "> ⚠️ Uma ou mais etapas de coleta falharam. Verifique os logs acima."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
