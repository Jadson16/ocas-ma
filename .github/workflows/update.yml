name: Atualizar painel OCAS-MA

on:
  schedule:
    - cron: '0 6 1 * *'   # 1º de cada mês às 06:00 UTC
  workflow_dispatch:        # permite disparar manualmente pela interface do GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install requests pandas plotly

      - name: Coletar dados SIDRA (babaçu)
        run: python scripts/fetch_data.py

      - name: Gerar mapa interativo
        run: python scripts/generate_map.py

      - name: Commit e push dos artefatos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/babacu/babacau_pevs.csv index.html
          git diff --cached --quiet || git commit -m "chore: atualiza dados e mapa [$(date +'%Y-%m-%d')]"
          git push
