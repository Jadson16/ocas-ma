name: Atualizar painel OCAS-MA

on:
  schedule:
    - cron: '0 6 1 * *'   # 1º de cada mês às 06:00 UTC
  workflow_dispatch:        # permite disparar manualmente pela interface do GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install requests pandas plotly

      - name: Coletar PEVS (extrativismo vegetal)
        run: |
          python scripts/fetch_data.py
          python scripts/fetch_acai.py
          python scripts/fetch_buriti.py
          python scripts/fetch_carnauba.py
          python scripts/fetch_carnauba_fibra.py
          python scripts/fetch_piacava.py

      - name: Coletar PAM (lavouras)
        run: |
          python scripts/fetch_pam_temp.py
          python scripts/fetch_pam_perm.py

      - name: Coletar PPM (producao animal e rebanhos)
        run: |
          python scripts/fetch_ppm_prod.py
          python scripts/fetch_ppm_rebanhos.py
          python scripts/fetch_mel.py

      - name: Gerar mapa interativo
        run: python scripts/generate_map.py

      - name: Commit e push dos artefatos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          git diff --cached --quiet || git commit -m "chore: atualiza dados e mapa [$(date +'%Y-%m-%d')]"
          git push
